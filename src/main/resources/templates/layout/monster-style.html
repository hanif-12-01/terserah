<!DOCTYPE html>

/* Color fallback for common arbitrary Tailwind colors. */
[class*="text-[#ffd96b]"] { color: var(--gold-bright) !important; }

.mi-page {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(212,169,74,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 30% 30%, rgba(156,122,196,0.15) 0%, transparent 50%),
    linear-gradient(180deg, #1e1825 0%, #0a0608 100%);
}
.mi-stars,
.mi-stars::before,
.mi-stars::after {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.mi-stars::before,
.mi-stars::after {
  content: '';
  position: absolute;
  inset: -10%;
  background-image:
    radial-gradient(1px 1px at 8% 14%, #fff, transparent),
    radial-gradient(2px 2px at 41% 28%, var(--gold-bright), transparent),
    radial-gradient(1px 1px at 58% 79%, #fff, transparent),
    radial-gradient(2px 2px at 88% 56%, var(--magic-glow), transparent);
  opacity: .7;
  animation: twinkle 4s infinite ease-in-out;
}
.mi-stars::after { opacity: .35; transform: scale(1.3); animation-delay: 2s; }
.mi-scanline {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 80;
  background: repeating-linear-gradient(180deg, rgba(255,255,255,.035) 0 1px, transparent 1px 5px);
  opacity: .2;
}

.pixel-card,
.mi-pixel-card {
  background: rgba(30,24,37,.94);
  border: 5px solid var(--wood-dark);
  box-shadow: var(--shadow-deep);
  color: var(--parchment);
}
.pixel-input {
  width: 100%;
  background: var(--bg-darker);
  border: 3px solid var(--wood-dark);
  color: var(--parchment);
  outline: none;
  font-family: 'VT323', monospace;
}
.pixel-input:focus {
  border-color: var(--gold-bright);
  box-shadow: 4px 4px 0 rgba(212,169,74,.25);
}
.mi-kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: rgba(156,122,196,.15);
  border: 2px solid var(--magic);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--magic-glow);
  margin-bottom: 18px;
  text-shadow: 1px 1px 0 #000;
}
.mi-btn {
  position: relative;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 16px 24px;
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  color: var(--wood-dark);
  border: 5px solid var(--wood-dark);
  box-shadow: 6px 6px 0 rgba(0,0,0,.5);
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  cursor: pointer;
  text-decoration: none;
}
.mi-btn:hover { transform: translate(-2px,-2px); box-shadow: 8px 8px 0 rgba(0,0,0,.5); }
.mi-arrow { display: inline-block; animation: arrowBounce 1s infinite; }

.mi-page main.relative.z-10.grid {
  width: min(100% - 32px, 1060px);
  margin: 0 auto;
  grid-template-columns: .95fr 1.05fr;
}
.mi-page main > section.pixel-card {
  max-width: 460px;
  width: 100%;
}
.mi-inn-art {
  position: relative;
  min-height: 420px;
  display: grid;
  place-items: end center;
}
.mi-portal {
  position: absolute;
  top: 0;
  left: 50%;
  width: min(72vw, 320px);
  aspect-ratio: 1;
  transform: translateX(-50%);
  border: 5px solid var(--magic);
  border-radius: 50%;
  background:
    conic-gradient(from 0deg, rgba(156,122,196,.1), rgba(255,217,107,.48), rgba(107,163,197,.4), rgba(156,122,196,.1)),
    radial-gradient(circle, rgba(255,217,107,.18) 0 18%, rgba(156,122,196,.48) 19% 44%, transparent 45%);
  box-shadow: 0 0 54px rgba(156,122,196,.42), inset 0 0 36px rgba(255,217,107,.2);
  animation: portalSpin 16s linear infinite, portalPulse 3.4s ease-in-out infinite;
}
.mi-inn {
  position: relative;
  width: min(92vw, 390px);
  height: 260px;
  z-index: 2;
  filter: drop-shadow(14px 14px 0 rgba(0,0,0,.5));
}
.mi-inn-roof {
  position: absolute;
  left: 20px;
  right: 20px;
  top: 18px;
  height: 76px;
  background: var(--wood-dark);
  border: 5px solid #1b120f;
  clip-path: polygon(0 100%,17% 20%,36% 20%,50% 0,64% 20%,83% 20%,100% 100%);
}
.mi-inn-body {
  position: absolute;
  left: 54px;
  right: 54px;
  bottom: 0;
  height: 190px;
  border: 5px solid #1b120f;
  background: repeating-linear-gradient(90deg, #4a382d 0 24px, #3a2e28 24px 48px);
}
.mi-window {
  position: absolute;
  width: 34px;
  height: 38px;
  border: 4px solid #1b120f;
  background: var(--gold-bright);
  box-shadow: 0 0 18px rgba(255,217,107,.6);
  animation: flame 2.2s ease-in-out infinite;
}
.mi-window.one { left: 86px; top: 118px; }
.mi-window.two { right: 86px; top: 118px; animation-delay: .8s; }
.mi-door {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 72px;
  height: 98px;
  transform: translateX(-50%);
  border: 5px solid #1b120f;
  background: linear-gradient(90deg, #21170f 0 48%, #120b08 48% 52%, #21170f 52%);
}
.mi-torch {
  position: absolute;
  bottom: 80px;
  width: 18px;
  height: 54px;
  background: #21170f;
  border: 3px solid #050208;
}
.mi-torch::before {
  content: "";
  position: absolute;
  left: -7px;
  top: -22px;
  width: 26px;
  height: 28px;
  background: var(--fire);
  box-shadow: 0 0 18px rgba(232,115,74,.8);
  clip-path: polygon(50% 0,78% 30%,100% 68%,50% 100%,0 68%,22% 30%);
  animation: flame .55s steps(2,end) infinite;
}
.mi-torch.left { left: 40px; }
.mi-torch.right { right: 40px; }
.mi-transition-overlay {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  background: rgba(5,2,8,.9);
  transition: opacity .22s ease;
}
.mi-transition-overlay.is-active { opacity: 1; pointer-events: auto; }
.mi-transition-overlay::before {
  content: "";
  width: min(62vw, 320px);
  aspect-ratio: 1;
  border-radius: 50%;
  border: 6px solid var(--magic);
  background: conic-gradient(var(--magic), var(--gold-bright), var(--water), var(--magic));
  box-shadow: 0 0 60px rgba(156,122,196,.78);
  animation: portalSpin .85s linear infinite;
}

.mi-app-shell {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(156,122,196,.15) 0%, transparent 60%),
    linear-gradient(180deg, #1a1428 0%, #0a0608 100%);
  color: var(--parchment);
}
.mi-app-shell aside {
  background: var(--bg-deep);
  border-right: 4px solid var(--wood-dark);
}
.mi-app-shell main {
  background:
    radial-gradient(circle at 85% 6%, rgba(212,169,74,.08), transparent 24rem),
    transparent;
}
.pixel-card:hover,
.room-box:hover,
.element-card:hover,
.service-item:hover {
  border-color: var(--gold-bright);
  transform: translate(-2px,-2px);
  box-shadow: 10px 10px 0 rgba(0,0,0,.48);
}
table { border-collapse: collapse; }
th, td { vertical-align: middle; }
button, input, select { font: inherit; }
a { color: inherit; }

@keyframes twinkle { 0%,100% { opacity:.3; } 50% { opacity:1; } }
@keyframes arrowBounce { 0%,100% { transform: translateX(0); } 50% { transform: translateX(6px); } }
@keyframes flame { 0%,100% { opacity:.75; transform: scaleY(.94); } 50% { opacity:1; transform: scaleY(1.08); } }
@keyframes portalSpin { to { rotate: 360deg; } }
@keyframes portalPulse { 0%,100% { scale: 1; opacity:.86; } 50% { scale:1.04; opacity:1; } }

@media (min-width: 768px) {
  .md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .md\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .md\:text-base { font-size: 1rem; }
  .md\:p-10 { padding: 2.5rem; }
  .md\:min-h-\[460px\] { min-height: 460px; }
}
@media (max-width: 1100px) {
  .mi-app-shell.flex { display: block; }
  .mi-app-shell aside {
    position: relative !important;
    width: 100% !important;
    height: auto !important;
  }
  .mi-app-shell aside nav {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .mi-app-shell main { padding: 24px !important; }
}
@media (max-width: 820px) {
  .mi-page main.relative.z-10.grid {
    grid-template-columns: 1fr;
    padding: 24px 0;
  }
  .mi-inn-art { min-height: 330px; order: -1; }
  .grid-cols-2,
  .grid-cols-3,
  .grid-cols-4,
  .grid-cols-12,
  .md\:grid-cols-3,
  .md\:grid-cols-4 { grid-template-columns: 1fr; }
  .col-span-4,
  .col-span-5,
  .col-span-7,
  .col-span-8 { grid-column: auto; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
    scroll-behavior: auto !important;
  }
}
</style>
