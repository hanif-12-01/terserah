<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Monster Inn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col justify-center items-center font-sans">

    <div class="text-center mb-10 animate-float">
        <h1 class="text-6xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-blue-500 to-green-500 mb-4">
            MONSTER INN
        </h1>
        <p class="text-xl text-gray-400">Sistem Manajemen Reservasi Entitas Fantasi</p>
    </div>

    <div class="flex gap-8 mb-12">
        <div class="bg-gray-800 p-6 rounded-2xl border border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)] text-center w-48">
            <div class="text-5xl mb-3">🔥</div>
            <h2 class="text-xl font-bold text-red-500">Kamar Api</h2>
            <p class="text-sm text-gray-400 mt-2">Injeksi Magma Termal</p>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl border border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] text-center w-48">
            <div class="text-5xl mb-3">💧</div>
            <h2 class="text-xl font-bold text-blue-500">Kamar Air</h2>
            <p class="text-sm text-gray-400 mt-2">Sistem Filtrasi Akuatik</p>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl border border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.5)] text-center w-48">
            <div class="text-5xl mb-3">🌿</div>
            <h2 class="text-xl font-bold text-green-500">Kamar Tanah</h2>
            <p class="text-sm text-gray-400 mt-2">Nutrisi Tanah Alami</p>
        </div>
    </div>

    <div>
        <a href="/login" class="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-indigo-600 font-pj rounded-xl focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-600 hover:bg-indigo-700 hover:scale-105">
            Masuk Resepsionis (Admin)
            <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
            </svg>
        </a>
    </div>

    <div class="mt-16 text-gray-500 text-sm">
        &copy; 2026 Kelompok 3 - Pemrograman Berorientasi Objek
    </div>

</body>
</html>
