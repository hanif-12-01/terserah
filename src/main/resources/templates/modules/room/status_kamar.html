<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/monster-inn-ui.css}">
    <th:block th:replace="~{layout/monster-style :: monster-style}"></th:block>
    <title>Status Habitat — Monster Inn</title>
    <style>
        body { background: #0f0b14; color: #f4e8d0; font-family: 'Pixelify Sans', sans-serif; image-rendering: pixelated; }
        .pixel-card { background: #1e1825; border: 4px solid #3a2e28; box-shadow: 6px 6px 0px #000; }
        .text-pixel { font-family: 'Press Start 2P', monospace; }
        .text-retro { font-family: 'VT323', monospace; }
        
        .room-box { min-width: 220px; border: 4px solid #3a2e28; position: relative; transition: all 0.2s; }
        .room-box:hover { transform: translateY(-5px); border-color: #ffd96b; }
        
        /* Status Tags */
        .status-tag { position: absolute; top: 0; right: 0; padding: 2px 8px; font-size: 10px; border-left: 4px solid #3a2e28; border-bottom: 4px solid #3a2e28; }
        .bg-available { background: #85a67a; color: #000; }
        .bg-occupied { background: #e8734a; color: #fff; }
        .bg-dirty { background: #666; color: #ccc; }

        /* Scrollbar Pixel Style */
        .pixel-scroll::-webkit-scrollbar { height: 8px; }
        .pixel-scroll::-webkit-scrollbar-track { background: #1e1825; }
        .pixel-scroll::-webkit-scrollbar-thumb { background: #3a2e28; border: 1px solid #ffd96b; }
    </style>
</head>
<body class="mi-app-shell flex min-h-screen">

    <div th:replace="~{layout/sidebar :: monster-sidebar}"></div>

    <main class="flex-1 p-8 overflow-x-hidden">
        <header class="mb-10 border-b-4 border-[#3a2e28] pb-6 flex justify-between items-center">
            <div>
                <div class="text-[#c08800] text-xs text-pixel mb-2 uppercase">✦ Monitoring Real-time</div>
                <h2 class="text-pixel text-xl text-[#ffd96b]">STATUS HABITAT</h2>
            </div>
            
            <div class="flex gap-4 text-retro text-xl">
                <span class="flex items-center gap-2"><div class="w-3 h-3 bg-[#85a67a]"></div> READY</span>
                <span class="flex items-center gap-2"><div class="w-3 h-3 bg-[#e8734a]"></div> OCCUPIED</span>
                <span class="flex items-center gap-2"><div class="w-3 h-3 bg-[#666]"></div> DIRTY</span>
            </div>
        </header>

        <section class="mb-12">
            <h3 class="text-pixel text-[10px] text-[#e8734a] mb-6 flex items-center gap-2">
                <i class="fa-solid fa-fire"></i> FIRE ZONE
            </h3>
            <div class="flex gap-6 overflow-x-auto pb-4 pixel-scroll">
                <div th:each="room : ${fireRooms}" class="room-box p-5" 
                     th:classappend="${room.status.name() == 'OCCUPIED' ? 'bg-[#2a1a1a]' : (room.status.name() == 'DIRTY' ? 'opacity-50' : '')}">
                    
                    <div class="status-tag font-bold" th:text="${room.status.label}"
                         th:classappend="${'bg-' + room.status.name().toLowerCase()}"></div>
                    
                    <div class="text-pixel text-[8px] mb-4 text-gray-500" th:text="'#' + ${room.roomId}"></div>
                    
                    <div class="flex justify-center mb-6">
                        <i th:if="${room.status.name() == 'OCCUPIED'}" class="fa-solid fa-dragon text-5xl text-[#ffd96b]"></i>
                        <i th:if="${room.status.name() == 'AVAILABLE'}" class="fa-solid fa-volcano text-5xl text-[#3a2e28]"></i>
                        <i th:if="${room.status.name() == 'DIRTY'}" class="fa-solid fa-broom text-5xl text-gray-400"></i>
                    </div>

                    <div class="text-center border-t-2 border-[#3a2e28] pt-3">
                        <p class="text-retro text-2xl font-bold uppercase" th:text="${room.currentGuest != null ? room.currentGuest.name : 'VACANT'}"></p>
                        
                        <form th:if="${room.status.name() == 'DIRTY'}" th:action="@{/room/clean/{id}(id=${room.roomId})}" method="post">
                            <button class="mt-2 text-[10px] bg-[#85a67a] text-black px-2 py-1 border-2 border-black hover:bg-white transition-all">CLEAN</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-12">
            <h3 class="text-pixel text-[10px] text-[#6ba3c5] mb-6 flex items-center gap-2">
                <i class="fa-solid fa-droplet"></i> WATER ZONE
            </h3>
            <div class="flex gap-6 overflow-x-auto pb-4 pixel-scroll">
                <div th:each="room : ${waterRooms}" class="room-box p-5"
                     th:classappend="${room.status.name() == 'OCCUPIED' ? 'bg-[#1a232a]' : ''}">
                    
                    <div class="status-tag font-bold" th:text="${room.status.label}"
                         th:classappend="${'bg-' + room.status.name().toLowerCase()}"></div>
                    
                    <div class="text-pixel text-[8px] mb-4 text-gray-500" th:text="'#' + ${room.roomId}"></div>
                    
                    <div class="flex justify-center mb-6">
                        <i th:if="${room.status.name() == 'OCCUPIED'}" class="fa-solid fa-dragon text-5xl text-[#9cd4ee]"></i>
                        <i th:if="${room.status.name() == 'AVAILABLE'}" class="fa-solid fa-water-ripple text-5xl text-[#3a2e28]"></i>
                        <i th:if="${room.status.name() == 'DIRTY'}" class="fa-solid fa-broom text-5xl text-gray-400"></i>
                    </div>

                    <div class="text-center border-t-2 border-[#3a2e28] pt-3">
                        <p class="text-retro text-2xl font-bold uppercase" th:text="${room.currentGuest != null ? room.currentGuest.name : 'VACANT'}"></p>
                        <form th:if="${room.status.name() == 'DIRTY'}" th:action="@{/room/clean/{id}(id=${room.roomId})}" method="post">
                            <button class="mt-2 text-[10px] bg-[#85a67a] text-black px-2 py-1 border-2 border-black hover:bg-white transition-all">CLEAN</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-12">
            <h3 class="text-pixel text-[10px] text-[#85a67a] mb-6 flex items-center gap-2">
                <i class="fa-solid fa-mountain"></i> EARTH ZONE
            </h3>
            <div class="flex gap-6 overflow-x-auto pb-4 pixel-scroll">
                <div th:each="room : ${earthRooms}" class="room-box p-5"
                     th:classappend="${room.status.name() == 'OCCUPIED' ? 'bg-[#1e2a1a]' : ''}">
                    
                    <div class="status-tag font-bold" th:text="${room.status.label}"
                         th:classappend="${'bg-' + room.status.name().toLowerCase()}"></div>
                    
                    <div class="text-pixel text-[8px] mb-4 text-gray-500" th:text="'#' + ${room.roomId}"></div>
                    
                    <div class="flex justify-center mb-6">
                        <i th:if="${room.status.name() == 'OCCUPIED'}" class="fa-solid fa-dragon text-5xl text-[#b5d4a8]"></i>
                        <i th:if="${room.status.name() == 'AVAILABLE'}" class="fa-solid fa-tree text-5xl text-[#3a2e28]"></i>
                        <i th:if="${room.status.name() == 'DIRTY'}" class="fa-solid fa-broom text-5xl text-gray-400"></i>
                    </div>

                    <div class="text-center border-t-2 border-[#3a2e28] pt-3">
                        <p class="text-retro text-2xl font-bold uppercase" th:text="${room.currentGuest != null ? room.currentGuest.name : 'VACANT'}"></p>
                        <form th:if="${room.status.name() == 'DIRTY'}" th:action="@{/room/clean/{id}(id=${room.roomId})}" method="post">
                            <button class="mt-2 text-[10px] bg-[#85a67a] text-black px-2 py-1 border-2 border-black hover:bg-white transition-all">CLEAN</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script defer th:src="@{/js/monster-inn-ui.js}"></script>
</body>
</html>
