<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/monster-inn-ui.css}">
    <th:block th:replace="~{layout/monster-style :: monster-style}"></th:block>
    <title>Registrasi Tamu — Monster Inn</title>
    <style>
        body { background: #0f0b14; color: #f4e8d0; font-family: 'Pixelify Sans', sans-serif; image-rendering: pixelated; }
        .pixel-card { background: #1e1825; border: 4px solid #3a2e28; box-shadow: 6px 6px 0px #000; }
        .text-pixel { font-family: 'Press Start 2P', monospace; }
        .text-retro { font-family: 'VT323', monospace; }
        
        .pixel-input { background: #050208; border: 3px solid #3a2e28; color: #f4e8d0; outline: none; }
        .pixel-input:focus { border-color: #ffd96b; }

        .element-card { border: 3px solid #3a2e28; transition: all 0.2s; cursor: pointer; }
        .element-card:hover { transform: translateY(-4px); }
        .active-fire { border-color: #e8734a; background: rgba(232, 115, 74, 0.1); }
        .active-water { border-color: #6ba3c5; background: rgba(107, 163, 197, 0.1); }
        .active-earth { border-color: #85a67a; background: rgba(133, 166, 122, 0.1); }
    </style>
</head>
<body class="mi-app-shell flex min-h-screen">

    <div th:replace="~{layout/sidebar :: monster-sidebar}"></div>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="mb-10 border-b-4 border-[#3a2e28] pb-6">
            <div class="text-[#c08800] text-xs text-pixel mb-2">✦ INKRIPSI TAMU BARU</div>
            <h2 class="text-pixel text-xl text-[#ffd96b]">REGISTRASI TAMU</h2>
        </header>

        <form th:action="@{/registrasi/simpan}" method="post" class="max-w-4xl space-y-8">
            <div class="pixel-card p-8 space-y-8">
                <div class="space-y-3">
                    <label class="text-pixel text-[8px] text-[#ffd96b] uppercase block">Nama Tamu Monster</label>
                    <input type="text" name="namaTamu" required placeholder="Gunakan aksara monster..." 
                        class="pixel-input w-full px-5 py-4 text-retro text-2xl">
                </div>

                <div class="space-y-4">
                    <label class="text-pixel text-[8px] text-[#ffd96b] uppercase block">Afinitas Elemen</label>
                    <input type="hidden" name="elemen" id="selected-element" required>
                    <div class="grid grid-cols-3 gap-6">
                        <div onclick="selectElement('fire')" id="el-fire" class="element-card p-6 text-center group">
                            <i class="fa-solid fa-fire text-3xl mb-3 text-[#a08860] group-hover:text-[#e8734a]"></i>
                            <p class="text-pixel text-[8px] uppercase">Fire</p>
                        </div>
                        <div onclick="selectElement('water')" id="el-water" class="element-card p-6 text-center group">
                            <i class="fa-solid fa-droplet text-3xl mb-3 text-[#a08860] group-hover:text-[#6ba3c5]"></i>
                            <p class="text-pixel text-[8px] uppercase">Water</p>
                        </div>
                        <div onclick="selectElement('earth')" id="el-earth" class="element-card p-6 text-center group">
                            <i class="fa-solid fa-mountain text-3xl mb-3 text-[#a08860] group-hover:text-[#85a67a]"></i>
                            <p class="text-pixel text-[8px] uppercase">Earth</p>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-pixel text-[8px] text-[#ffd96b] uppercase block">Alokasi Kamar Habitat</label>
                    <select id="room-select" name="noKamar" required class="pixel-input w-full px-5 py-4 text-retro text-2xl appearance-none cursor-pointer">
                        <option value="">Pilih elemen terlebih dahulu...</option>
                    </select>
                </div>

                <div class="space-y-3">
                    <label class="text-pixel text-[8px] text-[#ffd96b] uppercase block">Deposit Batu Mulia (Rp)</label>
                    <input type="number" name="deposit" value="200000" class="pixel-input w-full px-5 py-4 text-retro text-2xl">
                </div>
            </div>

            <button type="submit" class="w-full py-5 bg-[#d4a94a] border-4 border-[#3a2e28] text-[#3a2e28] text-pixel text-[10px] shadow-[6px_6px_0px_#000] hover:bg-[#ffd96b]">
                SELESAIKAN INKRIPSI CHECK-IN ▶
            </button>
        </form>
    </main>

    <script th:inline="javascript">
        /* Ambil data dari model Spring Boot */
        const allAvailableRooms = /*[[${availableRooms}]]*/ [];

        function selectElement(type) {
        document.getElementById('selected-element').value = type;

        // UI Feedback
        document.querySelectorAll('.element-card').forEach(card => card.className = 'element-card p-6 text-center group');
        document.getElementById(`el-${type}`).classList.add(`active-${type}`);
        
        const select = document.getElementById('room-select');
        select.innerHTML = '<option value="">Pilih habitat ' + type.toUpperCase() + '...</option>';
        
        // Filter kamar berdasarkan elementCap di DB (FIRE/WATER/EARTH)
        const filtered = allAvailableRooms.filter(room => 
            room.elementCap.toLowerCase() === type.toLowerCase() && !room.occupied
        );

        if (filtered.length === 0) {
            select.innerHTML = '<option value="" disabled>Kamar penuh!</option>';
        } else {
            filtered.forEach(room => {
                const opt = document.createElement('option');
                opt.value = room.roomId; // ID Kamar yang akan dikirim ke Java
                opt.textContent = `#${room.roomId} - ${room.elementCap} Habitat (Rp${room.roomRate})`;
                select.appendChild(opt);
            });
        }
    }
        
    </script>
    <script defer th:src="@{/js/monster-inn-ui.js}"></script>
</body>
</html>
