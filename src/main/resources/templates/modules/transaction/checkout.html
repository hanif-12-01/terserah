<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/monster-inn-ui.css}">
    <th:block th:replace="~{layout/monster-style :: monster-style}"></th:block>
    <title>Checkout & Tagihan — Monster Inn</title>
    <style>
        body { background: #0f0b14; color: #f4e8d0; font-family: 'Pixelify Sans', sans-serif; image-rendering: pixelated; }
        .pixel-card { background: #1e1825; border: 4px solid #3a2e28; box-shadow: 6px 6px 0px #000; }
        .text-pixel { font-family: 'Press Start 2P', monospace; }
        .text-retro { font-family: 'VT323', monospace; }
        .pixel-input { background: #050208; border: 3px solid #3a2e28; color: #f4e8d0; outline: none; }
        .invoice-box { background: #f4e8d0; color: #3a2e28; border: 4px solid #3a2e28; padding: 2rem; }
    </style>
</head>
<body class="mi-app-shell flex min-h-screen">
    <div th:replace="~{layout/sidebar :: monster-sidebar}"></div>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="mb-10 border-b-4 border-[#3a2e28] pb-6">
            <h2 class="text-pixel text-xl text-[#ffd96b]">CHECKOUT & TAGIHAN</h2>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-5 space-y-6">
                <div class="pixel-card p-6">
                    <label class="text-pixel text-[8px] text-[#ffd96b] block mb-4 uppercase">Siapa yang akan keluar?</label>
                    <select id="checkout-select" onchange="loadInvoice()" class="pixel-input w-full px-4 py-3 text-retro text-2xl appearance-none cursor-pointer">
                        <option value="">Pilih tamu...</option>
                        <option th:each="g : ${activeGuests}" th:value="${g.idMonster}" th:text="${g.name + ' (#' + g.roomId + ')'}"></option>
                    </select>
                </div>
                <div id="room-info" class="pixel-card p-6 hidden">
                    <div class="text-retro text-2xl">Kamar: <span id="info-room" class="font-bold"></span></div>
                    <div class="text-retro text-2xl">Durasi: <span id="info-stay"></span></div>
                </div>
            </div>

            <div class="col-span-7">
                <div id="invoice-ui" class="invoice-box hidden shadow-[12px_12px_0px_rgba(0,0,0,0.5)]">
                    <h3 class="text-pixel text-center text-[10px] mb-6 border-b-2 border-dashed border-[#3a2e28] pb-4">STRUK TAGIHAN</h3>
                    
                    <div class="space-y-4 text-retro text-2xl">
                        <div class="flex justify-between">
                            <span id="inv-label-room">Sewa Kamar</span>
                            <span id="inv-val-room" class="font-bold"></span>
                        </div>
                        <div id="inv-services" class="border-t border-[#3a2e28] pt-2 space-y-1"></div>
                        <div class="border-t-4 border-[#3a2e28] pt-4 mt-6">
                            <div class="flex justify-between opacity-60">
                                <span>Uang Muka:</span>
                                <span id="inv-val-prepaid"></span>
                            </div>
                            <div class="flex justify-between text-3xl font-bold mt-2">
                                <span>TOTAL:</span>
                                <span id="inv-val-total"></span>
                            </div>
                        </div>
                    </div>

                    <button onclick="confirmCheckout()" class="w-full mt-8 py-4 bg-[#3a2e28] text-[#f4e8d0] text-pixel text-[8px] hover:bg-black transition-all">
                        PROSES CHECKOUT ▶
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadInvoice() {
            const guestId = document.getElementById('checkout-select').value;
            if(!guestId) return;

            const res = await fetch(`/api/checkout-info/${guestId}`);
            const data = await res.json();

            document.getElementById('invoice-ui').classList.remove('hidden');
            document.getElementById('room-info').classList.remove('hidden');

            document.getElementById('info-room').innerText = "#" + data.roomId;
            document.getElementById('info-stay').innerText = data.stayDays + " Malam";
            document.getElementById('inv-val-room').innerText = "Rp " + data.roomTotal.toLocaleString();
            document.getElementById('inv-val-prepaid').innerText = "- Rp " + data.prepaid.toLocaleString();
            document.getElementById('inv-val-total').innerText = "Rp " + data.grandTotal.toLocaleString();

            let servicesHtml = data.serviceLog.map(s => `<div class="flex justify-between text-lg italic"><span>+ ${s}</span></div>`).join('');
            document.getElementById('inv-services').innerHTML = servicesHtml || '<p class="text-sm italic">Tanpa layanan tambahan</p>';
        }

        async function confirmCheckout() {
            const guestId = document.getElementById('checkout-select').value;
            if(!confirm("Proses checkout? Data naga akan dihapus dan kamar dikosongkan.")) return;

            const res = await fetch(`/api/checkout/confirm/${guestId}`, { method: 'POST' });
            if(res.ok) {
                alert("Checkout Berhasil! Naga telah terbang pulang.");
                window.location.href = "/room"; // Ke Status Kamar
            }
        }
    </script>
    <script defer th:src="@{/js/monster-inn-ui.js}"></script>
</body>
</html>
