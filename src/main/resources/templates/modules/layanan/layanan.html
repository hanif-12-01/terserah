<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/monster-inn-ui.css}">
    <th:block th:replace="~{layout/monster-style :: monster-style}"></th:block>
    <title>Layanan Tamu — Monster Inn</title>
    <style>
        body { background: #0f0b14; color: #f4e8d0; font-family: 'Pixelify Sans', sans-serif; image-rendering: pixelated; }
        .pixel-card { background: #1e1825; border: 4px solid #3a2e28; box-shadow: 6px 6px 0px #000; }
        .text-pixel { font-family: 'Press Start 2P', monospace; }
        .text-retro { font-family: 'VT323', monospace; }
        .pixel-input { background: #050208; border: 3px solid #3a2e28; color: #f4e8d0; outline: none; }
        .service-item { border: 3px solid #3a2e28; transition: all 0.2s; background: #1e1825; }
        .service-item:hover { border-color: #ffd96b; }
        .cart-item { border-bottom: 2px dashed #3a2e28; }
    </style>
</head>
<body class="mi-app-shell flex min-h-screen">
    <div th:replace="~{layout/sidebar :: monster-sidebar}"></div>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="mb-10 border-b-4 border-[#3a2e28] pb-6 flex justify-between items-end">
            <div>
                <div class="text-[#c08800] text-xs text-pixel mb-2 uppercase">✦ Perawatan Spesifik</div>
                <h2 class="text-pixel text-xl text-[#ffd96b]">LAYANAN TAMU</h2>
            </div>
            <div id="room-badge" class="hidden pixel-card px-4 py-2 bg-[#050208] text-[#9c7ac4] text-retro text-2xl uppercase">
                Kamar: <span id="badge-info" class="text-[#ffd96b]">--</span>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-8 space-y-6">
                <div class="pixel-card p-6">
                    <label class="text-pixel text-[8px] text-[#ffd96b] block mb-4 uppercase text-center">Pilih Tamu Aktif</label>
                    <select id="guest-select" onchange="resetCart(); updateServices()" class="pixel-input w-full px-4 py-3 text-retro text-2xl appearance-none cursor-pointer">
                        <option value="">Pilih dari daftar...</option>
                        <option th:each="g : ${activeGuests}" 
                                th:value="${g.idMonster}" 
                                th:data-room="${g.roomId}"
                                th:data-element="${g.getElement()}"
                                th:text="${g.name + ' (#' + g.roomId + ')'}">
                        </option>
                    </select>
                </div>

                <div id="service-container" class="grid grid-cols-1 gap-4">
                    <div class="pixel-card p-20 text-center opacity-40 border-dashed">
                        <i class="fa-solid fa-mortar-pestle text-5xl mb-4 text-[#3a2e28]"></i>
                        <p class="text-pixel text-[8px]">Silahkan pilih tamu untuk melihat menu...</p>
                    </div>
                </div>
            </div>

            <div class="col-span-4">
                <div class="pixel-card p-6 sticky top-0 bg-[#16111d]">
                    <h3 class="text-pixel text-[10px] text-[#ffd96b] mb-6 border-b-2 border-[#3a2e28] pb-4">
                        <i class="fa-solid fa-receipt mr-2"></i> RINGKASAN
                    </h3>
                    
                    <div id="cart-list" class="space-y-4 mb-6 min-h-[100px]">
                        <p class="text-retro text-xl text-gray-500 italic text-center py-4">Belum ada layanan...</p>
                    </div>

                    <div class="border-t-4 border-[#3a2e28] pt-4 mb-6">
                        <div class="flex justify-between items-center">
                            <span class="text-pixel text-[8px]">TOTAL</span>
                            <span id="total-price" class="text-retro text-3xl text-[#ffd96b]">Rp 0</span>
                        </div>
                    </div>

                    <button id="confirm-btn" onclick="submitOrder()" disabled
                            class="w-full py-4 bg-gray-700 border-b-4 border-gray-900 text-pixel text-[10px] text-gray-500 cursor-not-allowed transition-all">
                        KONFIRMASI PESANAN
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        const allServicesFromDB = /*[[${allServices}]]*/ [];
        let cart = [];

        function updateServices() {
            const select = document.getElementById('guest-select');
            const opt = select.options[select.selectedIndex];
            const container = document.getElementById('service-container');
            const badge = document.getElementById('room-badge');
            
            const element = opt.getAttribute('data-element');
            const roomId = opt.getAttribute('data-room');

            if(!element) { 
                badge.classList.add('hidden');
                container.innerHTML = `<div class="pixel-card p-20 text-center opacity-40 border-dashed"><p class="text-pixel text-[8px]">Silahkan pilih tamu...</p></div>`;
                return; 
            }

            badge.classList.remove('hidden');
            document.getElementById('badge-info').innerText = `#${roomId} (${element})`;

            const available = allServicesFromDB.filter(s => s.targetElement.toUpperCase() === element.toUpperCase());
            
            if(available.length === 0) {
                container.innerHTML = `<div class="pixel-card p-10 text-center text-retro text-2xl">Menu khusus elemen ${element} belum tersedia.</div>`;
                return;
            }

            container.innerHTML = available.map(s => `
                <div class="service-item p-6 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 border-2 border-[#3a2e28] flex items-center justify-center text-[#ffd96b] bg-[#0f0b14]">
                            <i class="fa-solid ${s.icon} text-2xl"></i>
                        </div>
                        <div>
                            <h4 class="text-retro text-2xl font-bold uppercase">${s.serviceName}</h4>
                            <p class="text-retro text-xl text-[#9c7ac4]">Rp ${s.price.toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                    <button onclick="addToCart('${s.serviceName}', ${s.price})" 
                            class="px-4 py-2 bg-[#85a67a] border-b-4 border-[#4c6145] text-pixel text-[7px] text-black hover:bg-[#a3c996] active:translate-y-1 active:border-b-0 transition-all">
                        + TAMBAH
                    </button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            renderCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function resetCart() {
            cart = [];
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            const btn = document.getElementById('confirm-btn');
            
            if(cart.length === 0) {
                list.innerHTML = `<p class="text-retro text-xl text-gray-500 italic text-center py-4">Belum ada layanan...</p>`;
                totalEl.innerText = "Rp 0";
                btn.disabled = true;
                btn.className = "w-full py-4 bg-gray-700 border-b-4 border-gray-900 text-pixel text-[10px] text-gray-500 cursor-not-allowed";
                return;
            }

            let total = 0;
            list.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="cart-item flex justify-between items-center py-2 animate-fade-in">
                        <div>
                            <p class="text-retro text-xl font-bold uppercase">${item.name}</p>
                            <p class="text-retro text-lg text-[#ffd96b]">Rp ${item.price.toLocaleString('id-ID')}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-300 text-sm px-2">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
            }).join('');

            totalEl.innerText = "Rp " + total.toLocaleString('id-ID');
            btn.disabled = false;
            btn.className = "w-full py-4 bg-[#d4a94a] border-b-4 border-[#8c6d2d] text-pixel text-[10px] text-black hover:bg-[#ffd96b] active:translate-y-1 active:border-b-0 transition-all shadow-[4px_4px_0px_#000]";
        }

        async function submitOrder() {
            const select = document.getElementById('guest-select');
            const roomId = select.options[select.selectedIndex].getAttribute('data-room');
            const guestId = select.value;

            if(!confirm(`Konfirmasi ${cart.length} layanan untuk Tamu di Kamar #${roomId}?`)) return;

            // Kita kirim satu per satu ke backend (atau bisa rombak backend biar terima list)
            for(let item of cart) {
                const data = { guestId, roomId, orderName: item.name, rate: item.price };
                await fetch('/service/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            }

            alert("✦ SEMUA LAYANAN BERHASIL DICATAT KE TAGIHAN! ✦");
            resetCart();
        }
    </script>
    <script defer th:src="@{/js/monster-inn-ui.js}"></script>
</body>
</html>
