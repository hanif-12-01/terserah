<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Resepsionis - Monster Inn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center font-sans">

    <div class="bg-gray-800 p-10 rounded-2xl border border-gray-700 shadow-2xl w-full max-w-md relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500 rounded-full blur-3xl opacity-20"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-red-500 rounded-full blur-3xl opacity-20"></div>

        <div class="text-center mb-8 relative z-10">
            <h2 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-500">
                MONSTER INN
            </h2>
            <p class="text-sm text-gray-400 mt-2">Portal Resepsionis</p>
        </div>

        <form action="/login" method="post" class="space-y-6 relative z-10">
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-gray-600"
                    placeholder="Masukkan username staf">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-gray-600"
                    placeholder="Masukkan password">
            </div>

            <div th:if="${param.error}" class="text-red-400 text-sm text-center font-semibold">
                Username atau password salah!
            </div>

            <button type="submit"
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-all duration-200 transform hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-600 focus:ring-offset-gray-900 shadow-[0_0_15px_rgba(79,70,229,0.4)]">
                Login ke Dashboard
            </button>
        </form>

        <div class="mt-6 text-center relative z-10">
            <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors">
                &larr; Kembali ke Halaman Utama
            </a>
        </div>
    </div>

</body>
</html>
